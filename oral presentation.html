<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ROBLOX Oral Presentation</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;

            background: linear-gradient(
                135deg,
                #ff0000,
                #ff7300,
                #fffb00,
                #48ff00,
                #00ffd5,
                #0066ff,
                #7a00ff,
                #ff00c8
            );

            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;

            color: white;
            text-align: center;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding-top: 40px;
            padding-bottom: 50px;
        }

        h1 {
            font-size: 55px;
            color: white;

            text-shadow:
                0px 0px 10px #ff00ff,
                0px 0px 20px #00ffff,
                0px 0px 30px #ffff00;

            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 24px;
            color: white;
            margin-bottom: 40px;

            text-shadow: 0px 0px 10px black;
        }

        .presentation-box {
            position: relative;
            width: 100%;
            height: 0;
            padding-top: 56.25%;

            border-radius: 25px;
            overflow: hidden;

            border: 6px solid white;

            box-shadow:
                0px 0px 25px #ff00ff,
                0px 0px 40px #00ffff,
                0px 0px 60px #ffff00;
        }

        iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;

            border: none;
        }

        .button {
            display: inline-block;
            margin-top: 40px;
            padding: 16px 32px;

            background: linear-gradient(
                90deg,
                #ff00ff,
                #00ffff,
                #ffff00
            );

            color: black;

            text-decoration: none;
            font-size: 22px;
            font-weight: bold;

            border-radius: 14px;

            box-shadow:
                0px 0px 15px white,
                0px 0px 25px #ff00ff;

            transition: 0.3s;
        }

        .button:hover {
            transform: scale(1.08) rotate(-1deg);

            box-shadow:
                0px 0px 25px white,
                0px 0px 40px #00ffff;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🎮 ROBLOX ORAL PRESENTATION 🎮</h1>

        <p class="subtitle">
            Design Analysis & Visual Communication
        </p>

        <div class="presentation-box">

            <iframe loading="lazy"
                src="https://www.canva.com/design/DAHHbGXSros/_5eif-fLlSUuHq5oKiW4-g/view?embed"
                allowfullscreen="allowfullscreen"
                allow="fullscreen">
            </iframe>

        </div>

        <a class="button"
            href="https://www.canva.com/design/DAHHbGXSros/_5eif-fLlSUuHq5oKiW4-g/view?utm_content=DAHHbGXSros&utm_campaign=designshare&utm_medium=embeds&utm_source=link"
            target="_blank">

             VIEW FULL PRESENTATION 

        </a>

    </div>

</body>

</html>
